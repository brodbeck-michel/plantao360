    filters: true
    query: false
    summary: false
    detail: false

  tests:
    unit: true
    integration: false
    contracts: false

aliases:
  - name: extras
    type: api
    description: Portuguese plural for API route
  - name: shift_extra
    type: storage
    description: Storage name for the entity

validation_profile: default

adr_references:
  - id: ADR-018
    title: Extras de Plantão
    decision: Extra entity manages shift extra hours with pending/approved/rejected/cancelled lifecycle
