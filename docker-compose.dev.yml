services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plantao360_backend_dev
    ports:
      - "8000:8000"
    env_file:
      - .env.development
    volumes:
      - ./backend:/app
      - plantao360_dev_data:/app/data
    networks:
      - plantao360_dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: node:20-alpine
    container_name: plantao360_frontend_dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - plantao360_dev
    command: npm run dev -- --host
    depends_on:
      backend:
        condition: service_healthy

volumes:
  plantao360_dev_data:

networks:
  plantao360_dev:
    driver: bridge
