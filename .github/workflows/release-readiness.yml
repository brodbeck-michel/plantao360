name: Release Readiness

on:
  push:
    branches: [main]

jobs:
  release-readiness:
    name: Release Readiness Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plantao360/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff pytest pytest-cov pyyaml

      - name: Release Readiness
        run: python tools/release_readiness.py

      - name: Architecture Score
        run: python tools/architecture_score.py

      - name: Module Maturity
        run: python tools/module_maturity.py

      - name: Generate Dashboard
        run: python tools/dev.py dashboard

      - name: Upload Release Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: |
            plantao360/backend/reports/dashboard.json
            plantao360/backend/reports/release-readiness.md
