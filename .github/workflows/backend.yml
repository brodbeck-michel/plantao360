name: Backend Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plantao360/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff pytest pytest-cov

      - name: Black (format check)
        run: black --check app/

      - name: Ruff (lint)
        run: ruff check app/

      - name: Pytest
        run: python -m pytest app/tests/ -v --tb=short

      - name: Coverage
        run: python -m pytest app/tests/ --cov=app --cov-report=html --cov-report=term --cov-fail-under=80

      - name: Contract Tests
        run: python -m pytest app/tests/contracts/ -v

      - name: Integration Tests
        run: python -m pytest app/tests/integration/ -v

      - name: Technical Debt
        run: python tools/technical_debt.py

      - name: Dependency Check
        run: python tools/check_dependencies.py

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: plantao360/backend/htmlcov/
