name: Release Images

# Constrói e publica as imagens de produção no GHCR.
# Dispara ao enviar uma tag de versão (vX.Y.Z) ou manualmente (workflow_dispatch).
# O servidor de produção NUNCA compila — apenas baixa estas imagens.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: plantao360-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: ""
          - image: plantao360-frontend
            context: .
            dockerfile: ./frontend/Dockerfile
            build_args: |
              VITE_MVP_MODE=true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/brodbeck-michel/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
