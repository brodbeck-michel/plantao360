name: Frontend

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend Quality Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plantao360/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: plantao360/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Quality Gates (ordem obrigatória) ──────────────────

      - name: "Gate 1: TypeScript"
        run: npx tsc -b
        continue-on-error: false

      - name: "Gate 2: ESLint"
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
        continue-on-error: false

      - name: "Gate 3: Unit Tests"
        run: npm test -- --coverage --watchAll=false
        continue-on-error: false

      - name: "Gate 4: Build"
        run: npm run build
        continue-on-error: false

      # ── Architecture Gates ─────────────────────────────────

      - name: "Gate 5: Architecture Validator"
        working-directory: plantao360/backend
        run: python tools/validate_architecture.py --all
        continue-on-error: false

      - name: "Gate 6: Golden Guard"
        working-directory: plantao360/backend
        run: python tools/golden_guard.py
        continue-on-error: false
