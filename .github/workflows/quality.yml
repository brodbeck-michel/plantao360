name: Quality Pipeline

on:
  pull_request:
    branches: [main, develop]

jobs:
  quality-pipeline:
    name: Full Quality Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plantao360/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff pytest pytest-cov pyyaml

      - name: Black
        run: black --check app/

      - name: Ruff
        run: ruff check app/

      - name: Pytest
        run: python -m pytest app/tests/ -v --tb=short

      - name: Coverage
        run: python -m pytest app/tests/ --cov=app --cov-report=term --cov-fail-under=80

      - name: Contract Tests
        run: python -m pytest app/tests/contracts/ -v

      - name: Integration Tests
        run: python -m pytest app/tests/integration/ -v

      - name: Architecture Validator
        run: python tools/validate_architecture.py --all

      - name: Architecture Linter
        run: python tools/lint_architecture.py

      - name: Golden Guard
        run: python tools/golden_guard.py

      - name: Release Readiness
        run: python tools/release_readiness.py

      - name: Generate Reports
        if: always()
        run: |
          python tools/project_metrics.py
          python tools/compliance_report.py --all
          python tools/architecture_score.py
          python tools/technical_debt.py

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            plantao360/backend/reports/
