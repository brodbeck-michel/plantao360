services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plantao360_backend_prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - plantao360_prod_data:/app/data
    networks:
      - plantao360_prod
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_MVP_MODE: "true"
    container_name: plantao360_frontend_prod
    restart: always
    ports:
      - "3001:80"
    networks:
      - plantao360_prod
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  plantao360_prod_data:

networks:
  plantao360_prod:
    driver: bridge
