# Produção — imagens são construídas no CI (GitHub Actions) e publicadas no GHCR.
# O servidor apenas baixa e sobe: TAG=vX.Y.Z ./scripts/deploy.sh
# NUNCA usar --build aqui.
services:
  db:
    image: postgres:16-alpine
    container_name: plantao360_db
    restart: always
    env_file:
      - .env.production
    volumes:
      - plantao360_pg_data:/var/lib/postgresql/data
    networks:
      - plantao360_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/brodbeck-michel/plantao360-backend:${TAG:-latest}
    container_name: plantao360_backend_prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    networks:
      - plantao360_prod
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: ghcr.io/brodbeck-michel/plantao360-frontend:${TAG:-latest}
    container_name: plantao360_frontend_prod
    restart: always
    ports:
      - "3001:80"
    networks:
      - plantao360_prod
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  plantao360_pg_data:

networks:
  plantao360_prod:
    driver: bridge
